---
- name: Install PostgreSQL
  apt:
    name:
      - postgresql
      - postgresql-contrib
    state: present
    update_cache: yes


- name: Enable PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started


- name: Allow remote PostgreSQL
  lineinfile:
    path: /etc/postgresql/*/main/postgresql.conf
    regexp: '^#?listen_addresses'
    line: "listen_addresses = '*'"
  notify:
    - Restart PostgreSQL

- name: Allow PostgreSQL authentication
  lineinfile:
    path: /etc/postgresql/*/main/pg_hba.conf
    line: "host all all 0.0.0.0/0 md5"
  notify:
    - Restart PostgreSQL
